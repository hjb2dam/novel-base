<!DOCTYPE html>
<html lang="ko" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TRPG Master Engine - NovelBase</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class' }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;700;900&display=swap');
        body { font-family: 'Pretendard', sans-serif; transition: background-color 0.3s, color 0.3s; overflow: hidden; }
        
        /* TRPG 전용 테마 Glassmorphism */
        .glass { backdrop-filter: blur(20px); transition: all 0.3s; }
        .dark .glass { background: rgba(30, 20, 15, 0.95); border: 1px solid rgba(245, 158, 11, 0.1); }
        html:not(.dark) .glass { background: rgba(255, 251, 235, 0.95); border: 1px solid rgba(217, 119, 6, 0.2); box-shadow: 0 10px 25px -5px rgba(0,0,0,0.05); }

        .tab-active { background-color: #d97706 !important; color: white !important; font-weight: 900; }
        .tab-inactive { background-color: transparent; }
        .dark .tab-inactive { background-color: rgba(0,0,0,0.3); color: #fbbf24; opacity: 0.7; }
        html:not(.dark) .tab-inactive { background-color: rgba(217, 119, 6, 0.1); color: #92400e; opacity: 0.8; }

        .ai-typing { animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        
        ::-webkit-scrollbar { width: 6px; }
        .dark ::-webkit-scrollbar-track { background: rgba(255,255,255,0.02); }
        html:not(.dark) ::-webkit-scrollbar-track { background: rgba(0,0,0,0.05); }
        ::-webkit-scrollbar-thumb { background: rgba(245, 158, 11, 0.5); border-radius: 4px; }
        
        .slide-panel { transition: transform 0.3s ease-in-out; }

        /* 툴팁 (말풍선) CSS */
        .tooltip { position: relative; display: inline-block; }
        .tooltip .tooltip-text {
            visibility: hidden; text-align: center; border-radius: 6px; padding: 6px 12px; position: absolute;
            z-index: 100; bottom: 125%; left: 50%; transform: translateX(-50%); opacity: 0; transition: opacity 0.3s;
            font-size: 11px; white-space: nowrap; font-weight: bold; box-shadow: 0 4px 6px rgba(0,0,0,0.1); pointer-events: none;
        }
        .dark .tooltip .tooltip-text { background-color: #451a03; color: #fef3c7; border: 1px solid #78350f; }
        html:not(.dark) .tooltip .tooltip-text { background-color: #fff; color: #92400e; border: 1px solid #fcd34d; }
        .tooltip:hover .tooltip-text { visibility: visible; opacity: 1; }
    </style>
</head>
<body class="bg-[#fefce8] text-[#451a03] dark:bg-[#1a0f0a] dark:text-amber-100 text-left h-screen flex flex-col relative transition-colors duration-300">

    <nav class="w-full glass z-[100] border-b border-amber-200 dark:border-amber-500/20 px-4 md:px-8 py-3 md:py-4 flex justify-between items-center shadow-lg">
        <div class="flex items-center gap-2 md:gap-3">
            <div class="text-2xl md:text-3xl">🎲</div>
            <span class="text-base md:text-xl font-black tracking-tighter uppercase text-amber-900 dark:text-white">TRPG <span class="text-amber-600 dark:text-amber-500 hidden md:inline">Master Engine</span></span>
        </div>
        <div class="flex items-center gap-3 md:gap-6">
            <button onclick="toggleTheme()" class="tooltip p-1 md:p-2 rounded-full hover:bg-amber-200 dark:hover:bg-amber-900/50 transition">
                <span id="theme-icon" class="text-base md:text-lg">🌞</span>
                <span class="tooltip-text">화면 밝기 변경</span>
            </button>
            <select id="app-lang" onchange="applyLanguage(); initProjectDropdown(); syncProjectData();" class="bg-white dark:bg-black/50 border border-amber-300 dark:border-amber-500/30 text-amber-800 dark:text-amber-200 text-[10px] md:text-xs p-1.5 md:p-2 rounded-lg outline-none cursor-pointer focus:border-amber-500 transition-colors">
                <option value="ko">🇰🇷 KOR</option>
                <option value="en">🇺🇸 ENG</option>
                <option value="zh">🇨🇳 CHN</option>
            </select>
            <div class="bg-amber-100 dark:bg-amber-500/10 border border-amber-300 dark:border-amber-500/30 px-3 py-1 md:px-4 md:py-1.5 rounded-full flex items-center gap-2 shadow-sm">
                <span class="text-amber-600 dark:text-amber-500 text-[8px] md:text-[10px] font-black italic">POINTS</span>
                <span id="user-points" class="text-amber-900 dark:text-white text-xs md:text-sm font-black">0</span>
            </div>
            <a href="index.html" class="tooltip text-[10px] md:text-xs font-bold text-amber-700 dark:text-amber-500/70 hover:text-amber-900 dark:hover:text-amber-400 transition underline" data-i18n="backToMain">
                ← 메인
                <span class="tooltip-text">메인 페이지로 돌아갑니다.</span>
            </a>
        </div>
    </nav>

    <div class="w-full bg-amber-50 dark:bg-black/50 border-b border-amber-200 dark:border-amber-500/20 px-4 md:px-8 py-2 flex gap-2 overflow-x-auto transition-colors">
        <button onclick="switchTrpgTab('play')" id="tab-play" data-i18n="tabPlay" class="tooltip flex-1 min-w-[120px] py-2 md:py-3 rounded-xl font-black text-xs md:text-sm transition-all tab-active tracking-widest uppercase shadow-sm">
            🏕️ 나홀로 모험 모드
            <span class="tooltip-text">캐릭터를 만들고 AI 마스터와 게임을 진행합니다.</span>
        </button>
        <button onclick="switchTrpgTab('tools')" id="tab-tools" data-i18n="tabTools" class="tooltip flex-1 min-w-[120px] py-2 md:py-3 rounded-xl font-black text-xs md:text-sm transition-all tab-inactive tracking-widest uppercase">
            🛠️ GM 보조 도구
            <span class="tooltip-text">NPC 반응이나 인카운터 시나리오를 생성합니다.</span>
        </button>
    </div>

    <div class="flex-1 flex overflow-hidden relative">

        <div id="mode-play" class="w-full h-full flex flex-col md:flex-row">
            
            <aside id="char-sheet-panel" class="slide-panel absolute md:relative z-[80] w-[85%] md:w-[340px] h-full glass border-r border-amber-200 dark:border-amber-500/20 flex flex-col p-5 md:p-6 space-y-4 transform -translate-x-full md:translate-x-0 overflow-y-auto custom-scrollbar">
                <div class="flex justify-between items-center mb-2">
                    <h3 class="text-amber-700 dark:text-amber-400 font-black text-lg md:text-xl uppercase tracking-tighter border-b border-amber-300 dark:border-amber-500/30 pb-2 w-full" data-i18n="charSheetTitle">📝 Character Sheet</h3>
                    <button onclick="toggleCharSheet()" class="md:hidden text-amber-600 dark:text-amber-500 text-xl font-bold px-2">✕</button>
                </div>

                <div class="bg-amber-100/50 dark:bg-amber-900/20 p-3 rounded-xl border border-amber-300 dark:border-amber-500/30 shadow-sm">
                    <label class="text-[10px] text-amber-700 dark:text-amber-500 font-bold uppercase mb-1 block" data-i18n="linkedProjectLabel">📚 연동할 세계관 설정</label>
                    <select id="linked-project" onchange="syncProjectData(); saveCampaign();" class="w-full bg-white dark:bg-black/50 text-amber-900 dark:text-amber-100 text-xs p-2 rounded-lg outline-none border border-amber-300 dark:border-amber-500/30 focus:border-amber-500">
                        </select>
                </div>
                
                <div class="space-y-3 bg-white/60 dark:bg-black/40 p-4 rounded-2xl border border-amber-200 dark:border-amber-500/10 shadow-sm">
                    <div><label class="text-[10px] text-amber-700 dark:text-amber-500 font-bold uppercase">NAME / CLASS</label><input type="text" id="pc-name" class="w-full bg-transparent border-b border-amber-300 dark:border-amber-500/30 text-amber-900 dark:text-white font-black outline-none py-1" value="이름없는 모험가 (전사)" oninput="saveCampaign()"></div>
                    <div class="grid grid-cols-2 gap-4 mt-2">
                        <div><label class="text-[10px] text-rose-600 dark:text-rose-500 font-bold uppercase">HP (Health)</label><input type="text" id="pc-hp" class="w-full bg-transparent border-b border-rose-300 dark:border-rose-500/30 text-rose-700 dark:text-rose-100 font-black outline-none py-1" value="20 / 20" oninput="saveCampaign()"></div>
                        <div><label class="text-[10px] text-blue-600 dark:text-blue-400 font-bold uppercase">MP / Stamina</label><input type="text" id="pc-mp" class="w-full bg-transparent border-b border-blue-300 dark:border-blue-400/30 text-blue-700 dark:text-blue-100 font-black outline-none py-1" value="10 / 10" oninput="saveCampaign()"></div>
                    </div>
                    <div class="grid grid-cols-4 gap-2 mt-3 pt-3 border-t border-amber-200 dark:border-amber-500/20">
                        <div><label class="text-[9px] text-orange-600 dark:text-orange-400 font-black uppercase text-center block">STR</label><input type="text" id="pc-str" class="w-full text-center bg-transparent border-b border-orange-300 text-orange-800 dark:text-orange-100 font-bold outline-none py-0.5 text-xs" value="10" oninput="saveCampaign()"></div>
                        <div><label class="text-[9px] text-emerald-600 dark:text-emerald-400 font-black uppercase text-center block">DEX</label><input type="text" id="pc-dex" class="w-full text-center bg-transparent border-b border-emerald-300 text-emerald-800 dark:text-emerald-100 font-bold outline-none py-0.5 text-xs" value="10" oninput="saveCampaign()"></div>
                        <div><label class="text-[9px] text-indigo-600 dark:text-indigo-400 font-black uppercase text-center block">INT</label><input type="text" id="pc-int" class="w-full text-center bg-transparent border-b border-indigo-300 text-indigo-800 dark:text-indigo-100 font-bold outline-none py-0.5 text-xs" value="10" oninput="saveCampaign()"></div>
                        <div><label class="text-[9px] text-pink-600 dark:text-pink-400 font-black uppercase text-center block">CHA</label><input type="text" id="pc-cha" class="w-full text-center bg-transparent border-b border-pink-300 text-pink-800 dark:text-pink-100 font-bold outline-none py-0.5 text-xs" value="10" oninput="saveCampaign()"></div>
                    </div>
                    <div class="grid grid-cols-3 gap-2 mt-2 pt-2 border-t border-amber-200 dark:border-amber-500/20">
                        <div><label class="text-[9px] text-purple-600 dark:text-purple-400 font-black uppercase text-center block">Fatigue</label><input type="text" id="pc-fatigue" class="w-full text-center bg-transparent border-b border-purple-300 text-purple-800 dark:text-purple-100 font-bold outline-none py-0.5 text-xs" value="0%" oninput="saveCampaign()"></div>
                        <div><label class="text-[9px] text-green-600 dark:text-green-400 font-black uppercase text-center block">Rations</label><input type="text" id="pc-ration" class="w-full text-center bg-transparent border-b border-green-300 text-green-800 dark:text-green-100 font-bold outline-none py-0.5 text-xs" value="3 Days" oninput="saveCampaign()"></div>
                        <div><label class="text-[9px] text-red-600 dark:text-red-400 font-black uppercase text-center block">Wanted</label><input type="text" id="pc-wanted" class="w-full text-center bg-transparent border-b border-red-300 text-red-800 dark:text-red-100 font-bold outline-none py-0.5 text-xs" value="0" oninput="saveCampaign()"></div>
                    </div>
                </div>

                <div class="flex-1 flex flex-col min-h-[150px] bg-white/60 dark:bg-black/40 p-4 rounded-2xl border border-amber-200 dark:border-amber-500/10 shadow-sm">
                    <label class="text-[10px] text-emerald-700 dark:text-emerald-400 font-bold uppercase mb-2">🎒 INVENTORY</label>
                    <textarea id="pc-inventory" class="w-full flex-1 bg-transparent text-emerald-900 dark:text-emerald-50 text-xs md:text-sm outline-none resize-none custom-scrollbar leading-relaxed" placeholder="- 낡은 롱소드&#10;- 가죽 갑옷&#10;- 체력 포션 2개&#10;- 금화 15G" oninput="saveCampaign()"></textarea>
                </div>
                
                <button onclick="resetCampaign()" data-i18n="resetBtn" class="tooltip w-full py-3 bg-rose-100 dark:bg-rose-900/50 hover:bg-rose-200 dark:hover:bg-rose-800 text-rose-700 dark:text-rose-200 font-bold text-xs rounded-xl transition border border-rose-300 dark:border-rose-500/30 shadow-sm">
                    초기화 및 새 모험 시작
                    <span class="tooltip-text">현재 진행 중인 채팅 로그와 정보를 모두 지웁니다.</span>
                </button>
            </aside>

            <main class="flex-1 flex flex-col bg-[#fffbeb] dark:bg-[#120a06] relative h-full transition-colors">
                <div class="md:hidden bg-amber-50 dark:bg-black/50 p-2 border-b border-amber-200 dark:border-amber-500/20 flex justify-between items-center">
                    <button onclick="toggleCharSheet()" class="text-[10px] font-bold text-amber-700 dark:text-amber-400 bg-amber-200 dark:bg-amber-900/40 px-3 py-1.5 rounded-lg border border-amber-300 dark:border-amber-500/30 shadow-sm">📱 Sheet</button>
                    <div class="text-[10px] text-amber-500/50 font-bold">Auto Saved</div>
                </div>

                <div class="bg-amber-100 dark:bg-amber-900/40 border-b border-amber-200 dark:border-amber-500/30 px-4 py-2 flex items-center shadow-sm z-10 relative">
                    <span class="text-xs md:text-sm font-black text-amber-800 dark:text-amber-400 whitespace-nowrap mr-2" data-i18n="questLabel">📜 현재 퀘스트:</span>
                    <input type="text" id="current-quest" class="flex-1 bg-transparent text-xs md:text-sm font-bold text-amber-900 dark:text-amber-100 outline-none" value="여관에서 정보를 수집하고 모험을 준비하세요." oninput="saveCampaign()">
                </div>

                <div id="campaign-log" class="flex-1 p-4 md:p-8 overflow-y-auto custom-scrollbar space-y-6 pb-20">
                    <div class="text-center mt-10 md:mt-20 space-y-4">
                        <div class="text-5xl md:text-6xl opacity-20">🏕️</div>
                        <p class="text-amber-600/60 dark:text-amber-500/40 font-bold italic text-sm md:text-lg">"당신의 이야기가 시작됩니다. 첫 행동을 입력하거나, '게임 시작해줘' 라고 입력하세요."</p>
                    </div>
                </div>

                <div class="bg-white/90 dark:bg-black/80 border-t border-amber-200 dark:border-amber-500/20 p-3 md:p-5 flex flex-col gap-3 backdrop-blur-md">
                    <div class="flex flex-wrap gap-2 items-center px-1">
                        <span class="text-[10px] md:text-xs text-amber-700 dark:text-amber-500 font-bold uppercase tracking-widest">🎲 Tools:</span>
                        <button onclick="rollVirtualDice(20)" class="tooltip px-3 py-1.5 bg-amber-100 dark:bg-amber-900/50 text-amber-800 dark:text-amber-200 text-[10px] md:text-xs font-black rounded-lg border border-amber-300 dark:border-amber-500/30 hover:bg-amber-300 dark:hover:bg-amber-600 transition shadow-sm">
                            D20
                            <span class="tooltip-text">D20</span>
                        </button>
                        <button onclick="rollVirtualDice(6)" class="tooltip px-3 py-1.5 bg-amber-100 dark:bg-amber-900/50 text-amber-800 dark:text-amber-200 text-[10px] md:text-xs font-black rounded-lg border border-amber-300 dark:border-amber-500/30 hover:bg-amber-300 dark:hover:bg-amber-600 transition shadow-sm">
                            D6
                            <span class="tooltip-text">D6</span>
                        </button>
                        <span id="dice-display" class="ml-1 md:ml-2 text-xs md:text-sm font-black text-emerald-600 dark:text-emerald-400"></span>
                        
                        <div class="ml-auto flex gap-2">
                            <button onclick="rewindFate()" data-i18n="btnRewind" class="tooltip px-3 py-1.5 bg-rose-100 dark:bg-rose-900/50 text-rose-800 dark:text-rose-200 text-[10px] md:text-xs font-black rounded-lg border border-rose-300 dark:border-rose-500/30 hover:bg-rose-200 dark:hover:bg-rose-800 transition shadow-sm">
                                ⏳ 되감기 (-5P)
                                <span class="tooltip-text">직전 턴의 치명적인 판정이나 실수를 취소하고 시간을 되돌립니다.</span>
                            </button>
                            <button onclick="generateSceneImage()" data-i18n="btnImg" class="tooltip px-3 py-1.5 bg-indigo-100 dark:bg-indigo-900/50 text-indigo-800 dark:text-indigo-200 text-[10px] md:text-xs font-black rounded-lg border border-indigo-300 dark:border-indigo-500/30 hover:bg-indigo-200 dark:hover:bg-indigo-800 transition shadow-sm">
                                🖼️ 씬 생성 (-1P)
                                <span class="tooltip-text">현재 묘사된 씬을 AI 이미지로 그립니다.</span>
                            </button>
                        </div>
                    </div>
                    
                    <div class="flex gap-2 items-stretch">
                        <select id="play-target" class="w-20 md:w-28 bg-slate-50 dark:bg-black/50 border border-amber-300 dark:border-amber-500/30 text-[10px] md:text-xs text-amber-900 dark:text-amber-100 rounded-xl px-2 outline-none focus:border-amber-500">
                            </select>
                        <textarea id="play-input" data-i18n-placeholder="playInputPh" class="flex-1 h-14 md:h-16 bg-slate-50 dark:bg-black/50 rounded-xl p-3 text-sm outline-none border border-amber-300 dark:border-amber-500/30 focus:border-amber-500 dark:focus:border-amber-400 text-amber-900 dark:text-amber-50 placeholder-amber-400/70 dark:placeholder:text-amber-500/30 resize-none custom-scrollbar" placeholder="무엇을 하시겠습니까? 대상에게 대화할 수도 있습니다."></textarea>
                        
                        <div class="flex flex-col gap-1 w-16 md:w-20">
                            <button onclick="sendPlayAction('insight')" data-i18n="btnInsight" class="tooltip flex-1 bg-indigo-600 hover:bg-indigo-500 rounded-lg font-black text-white text-[10px] md:text-xs transition-all shadow-md flex items-center justify-center">
                                🔍 통찰
                                <span class="tooltip-text">함정이나 거짓말, 물가의 적절성을 턴 소모 없이 시스템적으로 판정합니다. (-3P)</span>
                            </button>
                            <button onclick="sendPlayAction('action')" data-i18n="btnInput" class="tooltip flex-1 bg-amber-600 hover:bg-amber-500 rounded-lg font-black text-white text-[10px] md:text-xs transition-all shadow-md flex flex-col items-center justify-center leading-tight">
                                <span>입력</span><span class="text-[8px] font-medium opacity-80">(-2P)</span>
                                <span class="tooltip-text">행동이나 대사를 전달합니다.</span>
                            </button>
                        </div>
                    </div>
                </div>
            </main>
        </div>

        <div id="mode-tools" class="hidden w-full h-full flex flex-col md:flex-row overflow-y-auto md:overflow-hidden p-4 md:p-6 gap-6">
            <div class="w-full md:w-[400px] lg:w-[450px] flex flex-col gap-4 md:gap-6 md:overflow-y-auto custom-scrollbar md:pr-2">
                <div class="glass p-5 md:p-6 rounded-[1.5rem] md:rounded-3xl shadow-xl space-y-3 md:space-y-4 border border-amber-200 dark:border-amber-500/20">
                    <h3 class="text-base md:text-lg font-black text-amber-900 dark:text-white border-b border-amber-200 dark:border-amber-500/20 pb-2" data-i18n="scenarioTitle">⚔️ 전투 / 인카운터 생성</h3>
                    <textarea id="scenario-input" data-i18n-placeholder="scenarioPh" class="w-full h-20 md:h-32 bg-white/60 dark:bg-black/40 rounded-xl p-3 md:p-4 text-xs md:text-sm outline-none border border-amber-200 dark:border-amber-500/10 focus:border-amber-500 text-amber-900 dark:text-amber-50 placeholder-amber-400/70 dark:placeholder-amber-500/50" placeholder="상황 묘사 (예: 고블린 동굴 깊은 곳)"></textarea>
                    <button onclick="runTRPGTool('scenario')" data-i18n="scenarioBtn" class="tooltip w-full py-3 md:py-4 bg-amber-600 hover:bg-amber-500 rounded-xl font-black text-white text-xs md:text-sm shadow-lg transition">
                        시나리오 3개 생성 (-2P)
                        <span class="tooltip-text">상황에 맞는 위기나 몬스터 조우 이벤트를 추천받습니다.</span>
                    </button>
                </div>

                <div class="glass p-5 md:p-6 rounded-[1.5rem] md:rounded-3xl shadow-xl space-y-3 md:space-y-4 border border-emerald-200 dark:border-emerald-500/20">
                    <h3 class="text-base md:text-lg font-black text-emerald-900 dark:text-white border-b border-emerald-200 dark:border-emerald-500/20 pb-2" data-i18n="npcTitle">🎭 주사위 기반 NPC 연기</h3>
                    <input type="text" id="npc-name" data-i18n-placeholder="npcNamePh" class="w-full bg-white/60 dark:bg-black/40 p-3 rounded-xl outline-none border border-emerald-200 dark:border-emerald-500/10 focus:border-emerald-500 text-xs md:text-sm mb-1 text-emerald-900 dark:text-emerald-50 placeholder-emerald-400/70 dark:placeholder-emerald-500/50" placeholder="NPC 이름 및 성격 (예: 오크, 탐욕)">
                    <div class="flex flex-col gap-1.5 md:gap-2 mb-1">
                        <label class="text-[9px] md:text-[10px] text-emerald-600 dark:text-emerald-400 font-bold uppercase">Result</label>
                        <select id="dice-result" class="bg-white/60 dark:bg-black/40 p-2.5 md:p-3 rounded-xl outline-none border border-emerald-200 dark:border-emerald-500/10 text-xs md:text-sm text-emerald-900 dark:text-white font-bold focus:border-emerald-500 cursor-pointer">
                            <option value="대성공 (Critical Success)">🎲 대성공 (Nat 20)</option>
                            <option value="성공 (Success)" selected>🟢 성공</option>
                            <option value="실패 (Failure)">🔴 실패</option>
                            <option value="대실패 (Critical Failure)">☠️ 대실패 (Nat 1)</option>
                        </select>
                    </div>
                    <textarea id="player-action" data-i18n-placeholder="npcActionPh" class="w-full h-16 md:h-24 bg-white/60 dark:bg-black/40 rounded-xl p-3 md:p-4 text-xs md:text-sm outline-none border border-emerald-200 dark:border-emerald-500/10 focus:border-emerald-500 text-emerald-900 dark:text-emerald-50 placeholder-emerald-400/70 dark:placeholder-emerald-500/50" placeholder="플레이어의 행동/대사 (예: 칼을 들이댐)"></textarea>
                    <button onclick="runTRPGTool('npc')" data-i18n="npcBtn" class="tooltip w-full py-3 md:py-4 bg-emerald-600 hover:bg-emerald-500 rounded-xl font-black text-white text-xs md:text-sm shadow-lg transition">

            }
            targetSelect.innerHTML = targetHtml;

            localStorage.setItem('g_trpg_campaign', JSON.stringify(campaignData));
            renderCampaignLog();
            
            document.getElementById('campaign-log').innerHTML += `<div class="flex justify-center mb-6"><div class="bg-rose-900/80 text-rose-100 text-xs font-bold px-5 py-2 rounded-full animate-pulse shadow-lg border border-rose-400">⏳ 시간을 되돌렸습니다... 다른 선택을 해보세요.</div></div>`;
            scrollPlayToBottom();
        }

        async function sendPlayAction(type = 'action') {
            const inputEl = document.getElementById('play-input');
            const targetEl = document.getElementById('play-target');
            const actionText = inputEl.value.trim();
            const API_KEY = localStorage.getItem('groq_api_key');
            const lang = document.getElementById('app-lang').value;

            if(!API_KEY) return alert("API 키가 필요합니다.");
            if(!actionText && !lastRolledDice) return alert("행동을 입력하거나 주사위를 굴려주세요.");
            
            let cost = type === 'insight' ? 3 : 2;
            if(points < cost) return alert("포인트 부족!");

            let targetText = "";
            if (targetEl.value !== "gm") {
                targetText = `[대상: NPC ${targetEl.value}] `;
            }

            let userContent = targetText + actionText;
            
            if (type === 'insight') {
                userContent = `[시스템: 플레이어가 현재 상황/NPC에 대해 '통찰(Insight)' 샌드박스 검증을 시도합니다. 숨겨진 의도, 함정 여부, 상인의 바가지 등 속임수를 스탯을 기반으로 판정하여 은밀히 알려주세요.]\n` + userContent;
            }
            
            if (lastRolledDice) { userContent = lastRolledDice + "\n" + userContent; lastRolledDice = ""; document.getElementById('dice-display').innerText = ""; }
            
            campaignData.history.push({role: 'user', content: userContent});
            inputEl.value = ''; renderCampaignLog();
            points -= cost; lastChargedPoints = cost; updatePointDisplay();

            document.getElementById('campaign-log').innerHTML += `<div id="play-loading" class="flex justify-start mb-6"><div class="bg-white dark:bg-black/50 border border-emerald-200 dark:border-emerald-500/20 p-4 rounded-3xl rounded-tl-sm text-sm text-emerald-600 dark:text-emerald-400 ai-typing tracking-widest font-bold shadow-md">${type === 'insight' ? 'GM이 은밀히 주사위를 굴리는 중... 🔍' : 'GM이 상황을 판정 중입니다... 🎲'}</div></div>`;
            scrollPlayToBottom();

            saveCampaign();

            let loreContext = "";
            if (campaignData.linkedProjectId) {
                const project = allProjects.find(p => p.id == campaignData.linkedProjectId);
                if (project) {
                    let charStr = "";
                    if (project.chars && project.chars.length > 0) {
                        charStr = project.chars.map(c => `- ${c.name}: ${c.bg}`).join('\n');
                    }
                    loreContext = `\n[연동된 소설 세계관 및 설정]\n${project.lore}\n[등장인물(NPC) 정보]\n${charStr}\n`;
                }
            }

            let sysPrompt = `당신은 최고 수준의 판타지 TRPG 게임 마스터(GM)입니다. 플레이어와 1:1로 게임을 진행합니다.
${loreContext}
[플레이어 캐릭터 시트]
- 이름/직업: ${campaignData.pc.name}
- 스탯: STR(${campaignData.pc.str}) | DEX(${campaignData.pc.dex}) | INT(${campaignData.pc.int}) | CHA(${campaignData.pc.cha})
- HP: ${campaignData.pc.hp} | MP: ${campaignData.pc.mp} | 피로도: ${campaignData.pc.fatigue} | 식량: ${campaignData.pc.ration} | 수배도: ${campaignData.pc.wanted}
- 인벤토리:\n${campaignData.pc.inventory}

[GM 절대 수칙]
1. 행동/주사위 판정 시 반드시 [목표 난이도(DC): 숫자] 형태로 목표값을 먼저 제시하거나 결과에 반영하세요.
2. 세계관 내의 법치(Karma)를 엄격히 적용하세요. 범죄나 악행 시 '수배도'가 오르며, 경비병이 무거운 벌금을 징수하거나 투옥시킵니다.
3. 경제/자원: 상인과 거래 시 마을의 수요공급에 따라 물가가 변동됩니다. 행동에 따라 피로도 상승과 식량 소모를 묘사하세요.
4. 만약 스토리가 진행되어 플레이어의 현재 목표가 변경되었다면, 답변 맨 마지막 줄에 반드시 [QUEST: 새로운 목표 내용] 라고 적어주세요.
5. 플레이어가 피해를 입거나 아이템을 획득하면 시트나 인벤토리를 수정하라고 안내하고, 항상 "다음은 어떻게 하시겠습니까?"라고 주도권을 넘기세요.`;

            if (lang === 'ko') sysPrompt += `\n6. 반드시 100% 한국어로 대답하세요. 영어나 다른 언어의 고유명사는 원문 스펠링을 유지하세요.`;
            else if (lang === 'en') sysPrompt += `\n6. Must output entirely in English. Keep non-English proper nouns original.`;
            else if (lang === 'zh') sysPrompt += `\n6. 必须完全使用中文输出。专有名词保持原文。`;

            let messagesToSend = [{role: 'system', content: sysPrompt}];
            let filteredHistory = campaignData.history.filter(m => m.role === 'user' || m.role === 'assistant').slice(-10);
            messagesToSend = messagesToSend.concat(filteredHistory);

            try {
                const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: 'POST', headers: { 'Authorization': `Bearer ${API_KEY}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ model: "llama-3.3-70b-versatile", messages: messagesToSend, temperature: 0.7 })
                });
                const data = await response.json();
                
                let gmResponse = data.choices[0].message.content;
                
                const questMatch = gmResponse.match(/\[QUEST:\s*(.*?)\]/);
                if (questMatch) {
                    document.getElementById('current-quest').value = questMatch[1].trim();
                    saveCampaign();
                    gmResponse = gmResponse.replace(/\[QUEST:\s*(.*?)\]/g, '').trim();
                }

                campaignData.history.push({role: 'assistant', content: gmResponse});
                localStorage.setItem('g_trpg_campaign', JSON.stringify(campaignData));
                renderCampaignLog();
            } catch (err) {
                document.getElementById('play-loading').remove();
                alert("GM 통신 오류: " + err.message);
                campaignData.history.pop();
                points += cost; lastChargedPoints = 0; updatePointDisplay();
                renderCampaignLog();
            }
        }

        async function generateSceneImage() {
            const API_KEY = localStorage.getItem('groq_api_key');
            if(!API_KEY) return alert("API 키가 필요합니다.");
            
            let cost = 1;
            if(points < cost) return alert("포인트 부족!");

            const gmLogs = campaignData.history.filter(m => m.role === 'assistant');
            if (gmLogs.length === 0) return alert("이미지로 그릴 GM의 묘사가 아직 없습니다!");
            const lastScene = gmLogs[gmLogs.length - 1].content;

            points -= cost; lastChargedPoints = cost; updatePointDisplay();

            document.getElementById('campaign-log').innerHTML += `<div id="img-loading" class="flex justify-center mb-6"><div class="p-4 bg-black/10 dark:bg-white/5 rounded-2xl text-xs text-indigo-600 dark:text-indigo-400 font-bold ai-typing">AI가 현재 씬의 화풍을 상상하는 중입니다... 🎨</div></div>`;
            scrollPlayToBottom();

            const promptGenerator = `You are an image prompt generator. Convert the following TRPG scene description into a comma-separated English prompt for an AI image generator. Include keywords for atmosphere, lighting, and style (e.g. dark fantasy, realistic, cinematic lighting). Output ONLY the raw prompt without any explanation. \n\n[Scene]\n${lastScene}`;
            
            try {
                const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: 'POST', headers: { 'Authorization': `Bearer ${API_KEY}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ model: "llama-3.3-70b-versatile", messages: [{role: "user", content: promptGenerator}], temperature: 0.5 })
                });
                const data = await response.json();
                const imagePrompt = data.choices[0].message.content.trim();

                const encodedPrompt = encodeURIComponent(imagePrompt + ", detailed, masterpiece, 4k");
                const imageUrl = `https://image.pollinations.ai/prompt/${encodedPrompt}?width=768&height=512&nologo=true`;

                document.getElementById('img-loading').remove();
                
                campaignData.history.push({role: 'system_image', content: imageUrl});
                localStorage.setItem('g_trpg_campaign', JSON.stringify(campaignData));
                renderCampaignLog();

            } catch(e) {
                document.getElementById('img-loading').remove();
                alert("이미지 프롬프트 생성 실패: " + e.message);
                points += cost; updatePointDisplay();
            }
        }

        function scrollToolsToBottom() { const b = document.getElementById('result-tools'); b.scrollTop = b.scrollHeight; }

        async function runTRPGTool(mode) {
            const API_KEY = localStorage.getItem('groq_api_key');
            if(!API_KEY) return alert("API 키가 없습니다.");
            
            const resDiv = document.getElementById('result-tools');
            const lang = document.getElementById('app-lang').value;
            let cost = 2;

            if(points < cost) return alert("포인트 부족!");
            let prompt = "";
            
            if (mode === 'scenario') {
                const input = document.getElementById('scenario-input').value.trim();
                if(!input) return alert("상황을 입력하세요!");
                prompt = `당신은 TRPG 게임 마스터입니다.\n[현재 상황]\n${input}\n\n파티가 맞닥뜨릴 흥미로운 인카운터(전투/함정/NPC) 3가지를 극적으로 묘사해 제안하세요.`;
            } else if (mode === 'npc') {
                const npc = document.getElementById('npc-name').value.trim(); const dice = document.getElementById('dice-result').value; const action = document.getElementById('player-action').value.trim();
                if(!npc || !action) return alert("NPC 정보와 행동을 모두 입력하세요!");
                prompt = `TRPG 게임 마스터로서 NPC를 연기하세요.\n[NPC]\n${npc}\n[플레이어 행동]\n${action}\n[주사위 결과]\n${dice}\n\n주사위 결과에 따라 NPC가 어떻게 반응할지 행동 묘사와 대사를 분리해 극적으로 묘사하세요. 대실패 시 치명적 역효과, 대성공 시 압도적 이득을 줍니다.`;
            }

            if (lang === 'ko') prompt += `\n[⚠️반드시 100% 한국어로만 작성. 고유명사 원문 유지.]`;
            else if (lang === 'en') prompt += `\n[⚠️Output entirely in English. Keep proper nouns original.]`;
            else if (lang === 'zh') prompt += `\n[⚠️必须完全使用中文输出。专有名词保持原文。]`;

            points -= cost; lastChargedPoints = cost; updatePointDisplay();
            const loadingHtml = `<div id="tool-loading-mark" class="ai-typing text-amber-600 dark:text-amber-500 py-6 font-black tracking-widest text-sm border-t border-amber-300 dark:border-amber-500/20 mt-4 pt-4">GM이 시나리오를 짜는 중... 🎲</div>`;
            resDiv.innerHTML += loadingHtml; scrollToolsToBottom();

            try {
                const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: 'POST', headers: { 'Authorization': `Bearer ${API_KEY}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ model: "llama-3.3-70b-versatile", messages: [{role: "system", content: "You are an expert TRPG Game Master."}, {role: "user", content: prompt}], temperature: 0.7 })
                });
                const data = await response.json();
                document.getElementById('tool-loading-mark').remove();
                resDiv.innerHTML += `<div class="border-t border-amber-300 dark:border-amber-500/20 mt-4 pt-6"><span class="text-amber-700 dark:text-amber-500 text-xs font-bold bg-amber-200 dark:bg-amber-500/10 px-2 py-1 rounded-md mb-2 inline-block shadow-sm">GM의 답변</span><br>${marked.parse(data.choices[0].message.content)}</div>`;
                scrollToolsToBottom();
            } catch (err) {
                document.getElementById('tool-loading-mark').remove();
                resDiv.innerHTML += `<p class='text-rose-600 dark:text-rose-500 text-xs mt-2'>오류: ${err.message}</p>`;
                points += cost; lastChargedPoints = 0; updatePointDisplay(); scrollToolsToBottom();
            }
        }
    </script>
</body>
