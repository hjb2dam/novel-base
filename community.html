<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Community Lounge - NovelBase</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;700;900&display=swap');
        body { font-family: 'Pretendard', sans-serif; background-color: #0f172a; }
        .glass { background: rgba(30, 41, 59, 0.9); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .novel-card { transition: all 0.3s ease; }
        .novel-card:hover { transform: translateY(-5px); border-color: #10b981; box-shadow: 0 10px 25px -5px rgba(16, 185, 129, 0.2); }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: rgba(255,255,255,0.05); border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #10b981; border-radius: 10px; }
    </style>
</head>
<body class="text-slate-200 min-h-screen flex flex-col">

    <nav class="w-full glass sticky top-0 z-[100] border-b border-emerald-500/30 px-4 md:px-8 py-3 md:py-4 flex justify-between items-center shadow-lg">
        <div class="flex items-center gap-2 md:gap-3">
            <div class="text-2xl md:text-3xl">📚</div>
            <span class="text-base md:text-xl font-black tracking-tighter uppercase text-white">WebNovel <span class="text-emerald-400">Platform</span></span>
        </div>
        <div class="flex items-center gap-3 md:gap-6">
            <button onclick="openCreateNovelModal()" class="px-3 py-1.5 md:px-4 md:py-2 bg-emerald-600 hover:bg-emerald-500 text-white font-black text-[10px] md:text-sm rounded-lg md:rounded-xl shadow-lg transition">+ 새 작품 등록</button>
            <a href="index.html" class="text-[10px] md:text-xs font-bold text-slate-400 hover:text-white transition underline">← 메인으로</a>
        </div>
    </nav>

    <div class="max-w-[1400px] mx-auto w-full px-4 md:px-6 py-8 md:py-12 flex-1 flex flex-col">
        
        <div id="view-novel-list" class="block w-full">
            <div class="mb-8 md:mb-12 text-center space-y-2 md:space-y-3">
                <h2 class="text-2xl md:text-4xl font-black text-white italic uppercase tracking-widest">Novel <span class="text-emerald-400">Exhibition</span></h2>
                <p class="text-[10px] md:text-sm text-slate-400">다른 작가님들의 위대한 세계관에 접속하여 회차별로 평가해주세요.</p>
            </div>
            <div id="community-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 md:gap-8">
                </div>
        </div>

        <div id="view-chapter-list" class="hidden w-full flex-1 flex flex-col max-w-4xl mx-auto">
            <button onclick="backToNovelList()" class="self-start text-emerald-400 font-bold text-xs md:text-sm hover:text-white transition mb-6">← 작품 목록으로 돌아가기</button>
            
            <div class="glass p-6 md:p-10 rounded-[2rem] border border-white/10 mb-8">
                <div class="flex justify-between items-start mb-4">
                    <div>
                        <h2 id="detail-title" class="text-2xl md:text-4xl font-black text-white italic mb-2">작품 제목</h2>
                        <span id="detail-author" class="text-[10px] md:text-sm font-black text-emerald-400 bg-emerald-900/30 px-3 py-1 rounded-full border border-emerald-500/20">@작가이름</span>
                    </div>
                    <button id="btn-add-chapter" onclick="openCreateChapterModal()" class="hidden px-4 py-2 bg-indigo-600 hover:bg-indigo-500 text-white font-black text-[10px] md:text-xs rounded-xl shadow-lg transition">✍️ 새 회차 연재하기</button>
                </div>
                <p id="detail-desc" class="text-xs md:text-base text-slate-400 leading-relaxed mt-4 bg-slate-900/50 p-4 rounded-xl border border-white/5"></p>
            </div>

            <h3 class="text-lg font-black text-white mb-4 pl-2">회차 목록 (<span id="detail-chapter-count">0</span>)</h3>
            <div id="chapter-list-container" class="space-y-3">
                </div>
        </div>

    </div>

    <div id="modal-create-novel" class="hidden fixed inset-0 z-[200] flex items-center justify-center p-4 md:p-6 text-left">
        <div class="absolute inset-0 bg-black/95 backdrop-blur-md" onclick="closeCreateNovelModal()"></div>
        <div class="glass w-full max-w-2xl p-6 md:p-10 rounded-[2rem] md:rounded-[3rem] z-[210] border border-emerald-500/30 space-y-4 md:space-y-6">
            <h3 class="text-xl md:text-3xl font-black text-white italic uppercase">Create New Novel</h3>
            <p class="text-[10px] md:text-xs text-slate-400">새로운 작품의 껍데기(세계관)를 만듭니다. 이후 회차를 추가할 수 있습니다.</p>
            <input type="text" id="novel-title" class="w-full p-4 md:p-5 bg-slate-950 border border-white/5 rounded-xl md:rounded-2xl text-sm md:text-base text-white outline-none focus:border-emerald-500" placeholder="작품 제목 (예: 빙의한 마법사의 사정)">
            <textarea id="novel-desc" class="w-full h-32 md:h-40 p-4 md:p-5 bg-slate-950 border border-white/5 rounded-xl md:rounded-2xl text-xs md:text-sm text-white outline-none focus:border-emerald-500 custom-scrollbar" placeholder="작품 시놉시스 (줄거리 및 세계관 설명)"></textarea>
            <button onclick="submitNovel()" class="w-full py-4 md:py-5 bg-emerald-600 hover:bg-emerald-500 rounded-xl md:rounded-2xl font-black text-sm md:text-lg text-white shadow-xl transition-all">작품 등록하기</button>
        </div>
    </div>

    <div id="modal-create-chapter" class="hidden fixed inset-0 z-[200] flex items-center justify-center p-4 md:p-6 text-left">
        <div class="absolute inset-0 bg-black/95 backdrop-blur-md" onclick="closeCreateChapterModal()"></div>
        <div class="glass w-full max-w-4xl p-6 md:p-10 rounded-[2rem] md:rounded-[3rem] z-[210] border border-indigo-500/30 space-y-4 md:space-y-6 flex flex-col max-h-[90vh]">
            <h3 class="text-xl md:text-3xl font-black text-white italic uppercase">Publish Chapter</h3>
            <input type="text" id="chapter-title" class="w-full p-4 md:p-5 bg-slate-950 border border-white/5 rounded-xl md:rounded-2xl text-sm md:text-base text-white outline-none focus:border-indigo-500" placeholder="회차 제목 (예: 1화. 낯선 천장)">
            <textarea id="chapter-content" class="w-full flex-1 min-h-[200px] p-4 md:p-5 bg-slate-950 border border-white/5 rounded-xl md:rounded-2xl text-xs md:text-sm text-white outline-none focus:border-indigo-500 custom-scrollbar" placeholder="원고 본문 내용"></textarea>
            <button onclick="submitChapter()" class="w-full py-4 md:py-5 bg-indigo-600 hover:bg-indigo-500 rounded-xl md:rounded-2xl font-black text-sm md:text-lg text-white shadow-xl transition-all">연재하기</button>
        </div>
    </div>

    <div id="modal-read-chapter" class="hidden fixed inset-0 z-[300] flex items-center justify-center p-4 md:p-6 text-left">
        <div class="absolute inset-0 bg-black/98 backdrop-blur-3xl" onclick="closeReadChapterModal()"></div>
        <div class="glass w-full max-w-4xl p-6 md:p-12 rounded-[2rem] md:rounded-[3rem] z-[310] border border-emerald-500/30 shadow-2xl flex flex-col max-h-[95vh]">
            <button onclick="closeReadChapterModal()" class="absolute top-5 md:top-8 right-6 md:right-8 text-slate-500 text-xl md:text-2xl hover:text-white transition">✕</button>
            
            <p id="read-novel-title" class="text-[10px] md:text-xs text-emerald-400 font-bold mb-1"></p>
            <h3 id="read-chapter-title" class="text-xl md:text-4xl font-black text-white border-b border-white/5 pb-3 md:pb-4 mb-4 md:mb-6 italic truncate pr-8"></h3>
            
            <div id="read-chapter-content" class="flex-1 overflow-y-auto custom-scrollbar text-slate-300 text-sm md:text-lg leading-[1.8] md:leading-[2.2] whitespace-pre-wrap pr-2 md:pr-4 mb-4 md:mb-6"></div>
            
            <div class="flex justify-center items-center gap-4 md:gap-6 border-t border-white/5 pt-4 md:pt-6 mt-auto">
                <button id="btn-like" class="flex items-center gap-2 px-6 py-3 bg-slate-800 hover:bg-emerald-900/50 rounded-xl md:rounded-2xl transition border border-slate-700 hover:border-emerald-500 text-white font-black text-xs md:text-base shadow-lg">
                    👍 <span id="count-like">0</span>
                </button>
                <button id="btn-dislike" class="flex items-center gap-2 px-6 py-3 bg-slate-800 hover:bg-rose-900/50 rounded-xl md:rounded-2xl transition border border-slate-700 hover:border-rose-500 text-white font-black text-xs md:text-base shadow-lg">
                    👎 <span id="count-dislike">0</span>
                </button>
            </div>
        </div>
    </div>

    <script>
        // 다른 페이지(메인화면 등)와 데이터가 정상적으로 연동/공유될 수 있도록 원래의 저장소 키(g_comm_novels_v2)를 유지합니다.
        let commNovels = JSON.parse(localStorage.getItem('g_comm_novels_v2')) || [
            { 
                id: 1, 
                title: "검술명가 막내아들로 살아남기", 
                author: "검객킴", 
                desc: "무림 최고의 명가, 백가장의 뒷마당에서 눈을 뜬 30대 찌든 직장인의 무림 생존기.", 
                chapters: [
                    {
                        chapterId: 101,
                        title: "1화. 낯선 천장",
                        content: "눈을 떠보니 익숙한 천장이 아니었다.\n이곳은 무림 최고의 명가, 백가장의 뒷마당이었다.\n\n'내가 왜 이곳에 있는 거지?'\n\n머리가 깨질 듯이 아파왔다. 어제 분명히 야근을 마치고 편의점 도시락을 먹으며 자취방 침대에 누웠던 기억이 마지막이었다.",
                        likes: 45, dislikes: 2
                    },
                    {
                        chapterId: 102,
                        title: "2화. 기연을 얻다",
                        content: "그때, 밖에서 날카로운 쇳소리가 들려왔다.\n\n채챙!\n\n\"막내 도련님이 깨어나셨다! 어서 가주님께 알려라!\"\n\n도련님? 가주? \n나는 황급히 자리에서 일어나 거울을 찾았다.",
                        likes: 38, dislikes: 0
                    }
                ]
            }
        ];

        let currentViewNovelId = null; // 현재 열어본 작품 ID
        let currentReadChapterId = null; // 현재 읽고 있는 회차 ID

        // 1. 메인 작품 리스트 렌더링
        function renderNovelList() {
            const grid = document.getElementById('community-grid');
            if(commNovels.length === 0) {
                grid.innerHTML = `<div class="col-span-full text-center py-20 text-slate-500 italic text-sm">아직 등록된 소설이 없습니다. 첫 번째 작품을 등록해보세요!</div>`;
                return;
            }

            grid.innerHTML = commNovels.map(novel => {
                // 총 좋아요 수 계산 (모든 회차의 좋아요 합)
                const totalLikes = novel.chapters.reduce((sum, ch) => sum + ch.likes, 0);
                
                return `
                <div onclick="openNovelDetail(${novel.id})" class="glass p-6 md:p-8 rounded-[2rem] novel-card cursor-pointer flex flex-col border border-white/5 relative group h-[250px]">
                    <div class="flex justify-between items-start mb-2 md:mb-3">
                        <h3 class="font-black text-white text-lg md:text-xl italic truncate flex-1 pr-2">${novel.title}</h3>
                        <span class="text-[10px] font-bold text-slate-500 bg-black/50 px-2 py-1 rounded-md shrink-0">총 ${novel.chapters.length}화</span>
                    </div>
                    <span class="text-[10px] md:text-xs font-black text-emerald-400 mb-3 md:mb-4 block">@${novel.author}</span>
                    <p class="text-xs md:text-sm text-slate-500 overflow-hidden flex-1 leading-relaxed line-clamp-3">${novel.desc}</p>
                    
                    <div class="border-t border-white/5 pt-4 mt-auto text-[10px] md:text-xs font-bold text-slate-400">
                        <span class="text-emerald-500 mr-3">누적 추천 👍 ${totalLikes}</span>
                    </div>
                </div>
            `}).join('');
        }

        // 2. 작품 상세(회차 목록) 열기
        function openNovelDetail(id) {
            currentViewNovelId = id;
            const novel = commNovels.find(x => x.id === id);
            if(!novel) return;

            document.getElementById('view-novel-list').classList.add('hidden');
            document.getElementById('view-chapter-list').classList.remove('hidden');

            document.getElementById('detail-title').innerText = novel.title;
            document.getElementById('detail-author').innerText = `@${novel.author}`;
            document.getElementById('detail-desc').innerText = novel.desc;
            document.getElementById('detail-chapter-count').innerText = novel.chapters.length;

            // [권한 체크] 로그인한 닉네임과 작가 닉네임이 같으면 연재 버튼 활성화
            const currentUser = localStorage.getItem('g_user_nickname') || "무명작가";
            const btnAdd = document.getElementById('btn-add-chapter');
            if(novel.author === currentUser) {
                btnAdd.classList.remove('hidden');
            } else {
                btnAdd.classList.add('hidden');
            }

            renderChapterList();
        }

        // 회차 리스트 렌더링
        function renderChapterList() {
            const novel = commNovels.find(x => x.id === currentViewNovelId);
            const container = document.getElementById('chapter-list-container');
            
            if(novel.chapters.length === 0) {
                container.innerHTML = `<div class="p-6 text-center text-slate-500 bg-white/5 rounded-2xl italic text-xs">아직 연재된 회차가 없습니다.</div>`;
                return;
            }

            // 최신 회차가 위로 오게 뒤집어서 렌더링 (선택 사항, 여기선 순서대로 1화부터 렌더링)
            container.innerHTML = novel.chapters.map(ch => `
                <div onclick="openReadChapterModal(${ch.chapterId})" class="bg-slate-900/50 hover:bg-slate-800 p-4 md:p-5 rounded-2xl border border-white/5 hover:border-emerald-500/30 transition cursor-pointer flex justify-between items-center group">
                    <h4 class="text-sm md:text-base font-bold text-white group-hover:text-emerald-400 transition truncate pr-4">${ch.title}</h4>
                    <div class="flex items-center gap-4 shrink-0">
                        <span class="text-[10px] md:text-xs font-bold text-slate-400">👍 ${ch.likes}</span>
                        <span class="text-[10px] md:text-xs text-indigo-400 font-bold px-3 py-1 bg-indigo-900/30 rounded-lg">읽기 →</span>
                    </div>
                </div>
            `).join('');
        }

        function backToNovelList() {
            document.getElementById('view-chapter-list').classList.add('hidden');
            document.getElementById('view-novel-list').classList.remove('hidden');
            renderNovelList(); // 누적 좋아요 갱신을 위해 재렌더링
        }

        // ==========================================
        // 새 작품 만들기 로직
        // ==========================================
        function openCreateNovelModal() { document.getElementById('modal-create-novel').classList.remove('hidden'); }
        function closeCreateNovelModal() { document.getElementById('modal-create-novel').classList.add('hidden'); }

        function submitNovel() {
            const title = document.getElementById('novel-title').value.trim();
            const desc = document.getElementById('novel-desc').value.trim();
            const author = localStorage.getItem('g_user_nickname') || "무명작가";

            if(!title || !desc) return alert("제목과 시놉시스를 모두 적어주세요!");

            const newNovel = { id: Date.now(), title, author, desc, chapters: [] };
            commNovels.unshift(newNovel);
            
            // 다시 원래 공유되던 키 이름으로 복구
            localStorage.setItem('g_comm_novels_v2', JSON.stringify(commNovels));
            
            document.getElementById('novel-title').value = ''; document.getElementById('novel-desc').value = '';
            closeCreateNovelModal(); renderNovelList();
            alert("새로운 작품이 등록되었습니다! 이제 회차를 연재해보세요.");
        }

        // ==========================================
        // 새 회차 연재하기 로직
        // ==========================================
        function openCreateChapterModal() { document.getElementById('modal-create-chapter').classList.remove('hidden'); }
        function closeCreateChapterModal() { document.getElementById('modal-create-chapter').classList.add('hidden'); }

        function submitChapter() {
            const title = document.getElementById('chapter-title').value.trim();
            const content = document.getElementById('chapter-content').value.trim();
            if(!title || !content) return alert("제목과 본문을 입력해주세요!");

            const novel = commNovels.find(x => x.id === currentViewNovelId);
            if(!novel) return;

            novel.chapters.push({ chapterId: Date.now(), title, content, likes: 0, dislikes: 0 });
            
            // 다시 원래 공유되던 키 이름으로 복구
            localStorage.setItem('g_comm_novels_v2', JSON.stringify(commNovels));

            document.getElementById('chapter-title').value = ''; document.getElementById('chapter-content').value = '';
            closeCreateChapterModal();
            document.getElementById('detail-chapter-count').innerText = novel.chapters.length;
            renderChapterList();
            alert("새 회차가 성공적으로 연재되었습니다!");
        }

        // ==========================================
        // 회차 읽기 & 평가 (Like/Dislike) 로직
        // ==========================================
        function openReadChapterModal(chapterId) {
            currentReadChapterId = chapterId;
            const novel = commNovels.find(x => x.id === currentViewNovelId);
            const chapter = novel.chapters.find(c => c.chapterId === chapterId);
            
            if(chapter) {
                document.getElementById('read-novel-title').innerText = `${novel.title} >`;
                document.getElementById('read-chapter-title').innerText = chapter.title;
                document.getElementById('read-chapter-content').innerText = chapter.content;
                document.getElementById('count-like').innerText = chapter.likes;
                document.getElementById('count-dislike').innerText = chapter.dislikes;
                
                // 투표 이벤트 바인딩
                document.getElementById('btn-like').onclick = () => voteChapter(chapterId, 'like');
                document.getElementById('btn-dislike').onclick = () => voteChapter(chapterId, 'dislike');

                document.getElementById('modal-read-chapter').classList.remove('hidden');
                document.getElementById('read-chapter-content').scrollTop = 0; 
            }
        }

        function closeReadChapterModal() { document.getElementById('modal-read-chapter').classList.add('hidden'); }

        function voteChapter(chapterId, type) {
            // 중복 투표 방지 로직 (해당 회차에 투표한 기록이 있는지 검사)
            const voteKey = `voted_chapter_${chapterId}`;
            if (localStorage.getItem(voteKey)) {
                alert("이미 이 회차에 평가를 남기셨습니다.");
                return;
            }

            const novel = commNovels.find(x => x.id === currentViewNovelId);
            const chapter = novel.chapters.find(c => c.chapterId === chapterId);
            
            if(chapter) {
                if(type === 'like') chapter.likes += 1;
                if(type === 'dislike') chapter.dislikes += 1;
                
                // 다시 원래 공유되던 키 이름으로 복구
                localStorage.setItem('g_comm_novels_v2', JSON.stringify(commNovels));
                localStorage.setItem(voteKey, 'true'); 
                
                document.getElementById('count-like').innerText = chapter.likes;
                document.getElementById('count-dislike').innerText = chapter.dislikes;
                
                // 백그라운드 리스트 최신화
                renderChapterList();
            }
        }

        // 앱 시작 시
        window.onload = renderNovelList;
    </script>
</body>
</html>
