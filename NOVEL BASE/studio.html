<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>WebNovel Studio - NovelBase</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;700;900&display=swap');
        body { font-family: 'Pretendard', sans-serif; background-color: #020617; scroll-behavior: smooth; }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .ai-typing { animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        /* 에디터 전용 스크롤바 */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: rgba(255,255,255,0.05); }
        ::-webkit-scrollbar-thumb { background: rgba(79, 70, 229, 0.5); border-radius: 4px; }
    </style>
</head>
<body class="text-slate-200 text-left overflow-x-hidden h-screen flex flex-col">

    <nav class="w-full glass sticky top-0 z-[100] border-b border-indigo-500/20 px-8 py-4 flex justify-between items-center shadow-lg">
        <div class="flex items-center gap-3">
            <div class="text-2xl">✍️</div>
            <span class="text-xl font-black tracking-tighter uppercase text-white">WebNovel <span class="text-indigo-400">Studio</span></span>
        </div>
        <div class="flex items-center gap-6">
            <div class="bg-yellow-500/10 border border-yellow-500/20 px-4 py-1.5 rounded-full flex items-center gap-2">
                <span class="text-yellow-500 text-[10px] font-black italic">POINTS</span>
                <span id="user-points" class="text-white text-sm font-black">0</span>
            </div>
            <a href="index.html" class="text-xs font-bold text-slate-400 hover:text-white transition underline">← 메인으로 돌아가기</a>
        </div>
    </nav>

    <div class="flex-1 flex overflow-hidden">
        <aside class="w-[350px] glass border-r border-white/5 flex flex-col h-full overflow-y-auto p-6 space-y-6">
            <div class="space-y-2">
                <h3 class="text-indigo-400 font-black uppercase tracking-widest text-[10px]">My Novels</h3>
                <div id="project-list" class="space-y-1"></div>
            </div>
            
            <div class="flex-1 flex flex-col space-y-2">
                <div class="flex justify-between items-end">
                    <h3 class="text-emerald-400 font-black uppercase tracking-widest text-[10px]">Lore Reference (설정 참조)</h3>
                </div>
                <div id="lore-display" class="flex-1 bg-slate-950/50 rounded-2xl p-4 text-xs text-slate-400 leading-relaxed overflow-y-auto border border-white/5 whitespace-pre-wrap">
                    설정을 불러오는 중...
                </div>
            </div>
        </aside>

        <main class="flex-1 flex flex-col p-8 bg-[#0b0f19] relative">
            <div class="flex justify-between items-center mb-6">
                <input type="text" id="editor-title" class="bg-transparent text-3xl font-black text-white outline-none w-2/3 border-b border-transparent focus:border-indigo-500/50 pb-2 transition" placeholder="제목 없는 회차" oninput="autoSaveDraft()">
                <div class="text-[10px] text-slate-500 font-bold" id="save-status">자동 저장됨</div>
            </div>
            
            <textarea id="editor-content" class="flex-1 w-full bg-transparent outline-none text-base text-slate-300 leading-9 resize-none custom-scrollbar" placeholder="이곳에 위대한 이야기를 써 내려가세요..." oninput="autoSaveDraft(); countCharacters()"></textarea>
            
            <div class="mt-4 flex justify-between items-center border-t border-white/5 pt-4">
                <div class="text-xs font-bold text-slate-500">
                    공백 포함 <span id="char-count" class="text-indigo-400">0</span> 자 / 공백 제외 <span id="char-count-no-space" class="text-indigo-400">0</span> 자
                </div>
                <button onclick="applySmartFormat()" class="px-4 py-2 bg-slate-800 hover:bg-slate-700 rounded-lg text-[10px] font-black text-white transition">모바일 가독성 정렬</button>
            </div>
        </main>

        <aside class="w-[350px] glass border-l border-white/5 flex flex-col h-full p-6 space-y-6">
            <div>
                <h3 class="text-fuchsia-400 font-black uppercase tracking-widest text-[10px] mb-4">AI Writer Assistant</h3>
                <p class="text-[11px] text-slate-400 mb-4 leading-relaxed">글이 막히셨나요? 현재까지 쓴 원고와 메인 설정을 바탕으로 AI가 다음 문장이나 전개를 이어 써줍니다.</p>
                
                <button onclick="runAIAssist('next_sentence')" class="w-full py-4 bg-fuchsia-600 hover:bg-fuchsia-500 rounded-2xl font-black text-white shadow-xl transition-all mb-3 text-sm">
                    ✨ 다음 문장 추천받기 (-1P)
                </button>
                <button onclick="runAIAssist('evaluate')" class="w-full py-4 bg-slate-800 hover:bg-slate-700 border border-white/10 rounded-2xl font-black text-white transition-all text-sm">
                    🧐 현재 분량 피드백 (-1P)
                </button>
            </div>

            <div class="flex-1 flex flex-col space-y-2">
                <h3 class="text-slate-500 font-black uppercase tracking-widest text-[10px]">AI Response</h3>
                <div id="ai-result" class="flex-1 bg-slate-950/80 rounded-2xl p-4 text-sm text-fuchsia-100 overflow-y-auto border border-fuchsia-500/20 leading-relaxed">
                    AI 어시스턴트 대기 중...
                </div>
                <button onclick="insertAIResult()" id="insert-btn" class="hidden w-full py-3 bg-indigo-600 hover:bg-indigo-500 rounded-xl font-black text-white mt-2 transition text-xs">
                    에디터에 내용 추가하기
                </button>
            </div>
        </aside>
    </div>

    <script>
        let API_KEY = localStorage.getItem('groq_api_key');
        let points = parseInt(localStorage.getItem('g_points')) || 0;
        let projects = JSON.parse(localStorage.getItem('g_projects')) || [];
        let currentId = null;
        let lastAIContent = "";

        window.onload = () => {
            if(!API_KEY) {
                alert("메인 페이지에서 API 키(gsk_...)를 먼저 등록해야 스튜디오를 사용할 수 있습니다!");
                window.location.href = "index.html";
                return;
            }
            updatePointDisplay();
            
            if(projects.length > 0) {
                currentId = projects[0].id;
                renderProjects();
                loadProject(currentId);
            } else {
                alert("생성된 소설 프로젝트가 없습니다. 메인 페이지에서 먼저 소설을 생성해주세요.");
                window.location.href = "index.html";
            }
        };

        function updatePointDisplay() {
            document.getElementById('user-points').innerText = points.toLocaleString();
            localStorage.setItem('g_points', points);
        }

        function renderProjects() {
            const list = document.getElementById('project-list');
            list.innerHTML = projects.map(p => `
                <div onclick="loadProject(${p.id})" class="p-3 rounded-xl cursor-pointer text-[11px] font-black truncate transition-all ${p.id === currentId ? 'bg-indigo-600/20 text-indigo-400 border border-indigo-500/20' : 'text-slate-600 hover:bg-white/5'}">
                    ${p.title}
                </div>
            `).join('');
        }

        function loadProject(id) {
            currentId = id;
            const p = projects.find(x => x.id === id);
            if(p) {
                document.getElementById('lore-display').innerText = p.lore || "입력된 설정이 없습니다. 메인 페이지에서 설정을 입력하세요.";
                // 에디터 임시 저장 데이터 불러오기 (로컬 스토리지 키: g_draft_프로젝트ID)
                const draft = JSON.parse(localStorage.getItem(`g_draft_${id}`)) || { title: "", content: "" };
                document.getElementById('editor-title').value = draft.title;
                document.getElementById('editor-content').value = draft.content;
                countCharacters();
                renderProjects();
            }
        }

        function autoSaveDraft() {
            const title = document.getElementById('editor-title').value;
            const content = document.getElementById('editor-content').value;
            localStorage.setItem(`g_draft_${currentId}`, JSON.stringify({ title, content }));
            
            const status = document.getElementById('save-status');
            status.innerText = "저장 중...";
            status.classList.add('text-emerald-400');
            setTimeout(() => { 
                status.innerText = "자동 저장됨"; 
                status.classList.remove('text-emerald-400');
            }, 1000);
        }

        function countCharacters() {
            const text = document.getElementById('editor-content').value;
            document.getElementById('char-count').innerText = text.length.toLocaleString();
            document.getElementById('char-count-no-space').innerText = text.replace(/\s/g, '').length.toLocaleString();
        }

        function applySmartFormat() {
            const area = document.getElementById('editor-content');
            if(!area.value) return;
            area.value = area.value.replace(/\n/g, '\n\n').replace(/\s{2,}/g, ' ');
            autoSaveDraft();
            countCharacters();
            alert("모바일 가독성에 맞게 문단이 정렬되었습니다!");
        }

        async function runAIAssist(mode) {
            const p = projects.find(x => x.id === currentId);
            const content = document.getElementById('editor-content').value.trim();
            const resDiv = document.getElementById('ai-result');
            const insertBtn = document.getElementById('insert-btn');

            if(points < 1) return alert("포인트가 부족합니다!");
            if(!content) return alert("에디터에 원고를 조금이라도 작성해야 AI가 분석할 수 있습니다.");

            points -= 1;
            updatePointDisplay();
            insertBtn.classList.add('hidden');
            resDiv.innerHTML = "<div class='ai-typing text-fuchsia-400 py-10 text-center font-black uppercase italic'>Writing...</div>";

            let prompt = `[소설 전체 설정]\n${p.lore}\n\n[현재까지 작성한 원고 내용]\n${content}\n\n`;

            if(mode === 'next_sentence') {
                prompt += `위 내용에 이어질 자연스럽고 매끄러운 '다음 문단'이나 '대사'를 300자 내외로 작성해줘. 불필요한 설명 없이 바로 본문만 출력해.`;
            } else if (mode === 'evaluate') {
                prompt += `현재까지 작성된 원고의 장점, 단점, 전개 속도, 그리고 앞으로의 방향성에 대해 웹소설 편집자 시점에서 짧고 굵게 피드백해줘.`;
            }

            try {
                const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${API_KEY}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ model: "llama-3.3-70b-versatile", messages: [{role: "system", content: "최고의 웹소설 공동 집필 AI."}, {role: "user", content: prompt}] })
                });
                const data = await response.json();
                lastAIContent = data.choices[0].message.content;
                resDiv.innerHTML = marked.parse(lastAIContent);
                
                if(mode === 'next_sentence') insertBtn.classList.remove('hidden');
            } catch (err) {
                resDiv.innerHTML = "Error: " + err.message;
                points += 1; updatePointDisplay();
            }
        }

        function insertAIResult() {
            const area = document.getElementById('editor-content');
            // 마크다운 잔재나 불필요한 공백 제거 후 에디터에 삽입
            const cleanText = lastAIContent.replace(/\*\*/g, '').trim(); 
            area.value += (area.value.endsWith('\n') ? '' : '\n\n') + cleanText;
            autoSaveDraft();
            countCharacters();
            document.getElementById('insert-btn').classList.add('hidden');
            document.getElementById('ai-result').innerHTML = "내용이 성공적으로 에디터에 추가되었습니다.";
        }
    </script>
</body>
</html>
